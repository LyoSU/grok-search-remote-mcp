services:
  grok-search-mcp:
    build: .
    restart: unless-stopped
    ports:
      - "3000"
    environment:
      - XAI_API_KEY=${XAI_API_KEY}
      - GROK_MODEL=${GROK_MODEL:-grok-4.20-beta-latest-reasoning}
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
